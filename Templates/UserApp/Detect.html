<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Detect APT Attack | XAI Security</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="Effective Classification of DDOS Attacks Using Hierarchical Machine Learning and Hyperparameter Optimization" name="keywords">
    <meta content="User interface for real-time APT attack detection." name="description">

    <link href="img/favicon.ico" rel="icon">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <link href="{{url_for('static', filename='lib/animate/animate.min.css')}}" rel="stylesheet">
    <link href="{{url_for('static', filename='lib/owlcarousel/assets/owl.carousel.min.css')}}" rel="stylesheet">
    <link href="{{url_for('static', filename='lib/tempusdominus/css/tempusdominus-bootstrap-4.min.css')}}" rel="stylesheet" />

    <link href="{{url_for('static', filename='css/bootstrap.min.css')}}" rel="stylesheet">

    <link href="{{url_for('static', filename='css/style.css')}}" rel="stylesheet">
    
    <style>
        /* --- XAI ELEGANCE STYLES (DETECTION FORM PAGE) --- */

        /* COLOR PALETTE */
        :root {
            --primary: #9B1C31; /* Rich Burgundy/Maroon Accent */
            --secondary-dark: #0F1D36; /* Deep Navy/Ink Base */
            --gold-accent: #B8860B; /* Subtle Gold/Dark Copper for luxury */
            --light-base: #FFFFFF; /* Pure White elements */
            --off-white-bg: #FAFAFA; /* Lightest Gray/Off-White Background */
            --shadow: rgba(155, 28, 49, 0.2); 
        }

        /* BASE & TYPOGRAPHY */
        body {
            font-family: 'Roboto', sans-serif;
            color: #555555; 
            background-color: var(--off-white-bg); /* Clean background */
            /* Using a subtle, professional background image style */
            background-image: url('{{ url_for("static", filename="img/about.jpg") }}');
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-position: center;
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Playfair Display', serif; 
            font-weight: 700;
            color: var(--secondary-dark); 
        }
        
        /* NAVBAR - Deep Navy */
        .navbar {
            background-color: var(--secondary-dark) !important; 
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3); 
            padding-top: 15px !important;
            padding-bottom: 15px !important;
        }
        .navbar-brand h1 {
            color: var(--light-base) !important; 
            font-size: 1.4rem !important; 
            font-weight: 900 !important;
            padding-left: 20px;
        }
        .navbar-brand h1 i {
            color: var(--gold-accent); 
            font-size: 1.2em; 
        }
        .navbar-brand .m-0.text-primary {
            color: var(--light-base) !important;
            font-size: 1.4rem !important;
        }
        .nav-link {
            color: #DDDDDD !important; 
            margin: 0 10px;
            transition: all 0.3s;
        }
        .nav-link:hover, .nav-item .nav-link.active {
            color: var(--primary) !important; 
            border-bottom: 2px solid var(--primary); 
            padding-bottom: 5px !important;
        }

        /* CTA BUTTONS (Logout & Submit) */
        .btn-primary {
            background-color: var(--primary);
            border-color: var(--primary);
            color: var(--light-base) !important; 
            box-shadow: 0 4px 15px var(--shadow); 
            border-radius: 8px !important; 
            padding: 16px 50px;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background-color: #7A1727; 
            border-color: #7A1727;
        }

        /* FORM CONTAINER */
        .card {
            border-radius: 15px !important;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2) !important;
        }
        .card-header {
            background-color: var(--secondary-dark) !important; /* Deep Navy header */
            border-bottom: 5px solid var(--primary); /* Burgundy accent line */
            border-radius: 15px 15px 0 0 !important;
        }
        .card-header h2 {
            color: var(--gold-accent) !important; /* Gold title */
            font-size: 2.2rem;
        }
        .card-header p {
            color: #AAAAAA !important;
        }
        .card-body {
            background-color: var(--light-base) !important; /* White body */
        }
        
        /* FORM INPUT STYLES */
        .form-label {
            color: var(--secondary-dark) !important;
            font-weight: 700 !important;
            font-size: 1.05rem;
            margin-bottom: 5px;
        }
        .form-control {
            border: 1px solid #DDDDDD;
            transition: border-color 0.3s, box-shadow 0.3s;
            padding: 12px 15px;
            font-size: 1rem;
        }
        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 0.25rem rgba(155, 28, 49, 0.25);
        }

        /* Message Box */
        .card-body > font {
            display: block;
            margin-bottom: 20px;
            text-align: center;
            font-size: 1.1rem;
            font-weight: bold;
        }

        /* Back to Top */
        .back-to-top {
            background-color: var(--primary) !important;
            color: var(--light-base) !important;
            box-shadow: 0 0 15px var(--shadow) !important;
            border-radius: 8px !important; 
        }
    </style>
</head>

<body>

    <div class="container-fluid bg-light p-0 wow fadeIn" data-wow-delay="0.1s">
        <div class="row gx-0 d-none d-lg-flex">
            <div class="col-lg-7 px-5 text-start"></div>
            <div class="col-lg-5 px-5 text-end"></div>
        </div>
    </div>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top p-0 wow fadeIn" data-wow-delay="0.1s">
        <a href="index.html" class="navbar-brand d-flex align-items-center px-4 px-lg-5">
            <h1 class="m-0"><i class="fas fa-car-side me-3" style="color: var(--gold-accent);"></i>XAI | ATTACK DETECTION</h1>
        </a>
        <button type="button" class="navbar-toggler me-4" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarCollapse">
            <div class="navbar-nav ms-auto p-4 p-lg-0">
                <a href="/UserHome" class="nav-item nav-link">Home</a>
                <a href="/Detect" class="nav-item nav-link active">Detect APT Attack</a>
            </div>
            <a href="/userlogin" class="btn btn-primary rounded-0 py-4 px-lg-5 d-none d-lg-block">Logout<i class="fa fa-arrow-right ms-3"></i></a>
        </div>
    </nav>
    <div class="container-xxl py-5">
    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-lg-8 wow fadeInUp" data-wow-delay="0.2s">
                <div class="card shadow-lg border-0 rounded-4">
                    
                    <div class="card-header text-center py-4 rounded-top-4">
                        <h2 class="mb-0"><i class="fas fa-shield-alt me-2"></i> APT Attack Detection</h2>
                        <p class="mb-0">Enter the network parameters to predict attack</p>
                    </div>

                    <div class="card-body p-5">
                        <font color="red">{{msg}}</font>
                        
                        <form method="post" action="/DetectAction" class="row g-4">

                            <div class="col-md-6">
                                <label class="form-label fw-bold"><i class="fas fa-toggle-on me-2" style="color: var(--primary);"></i>Switch</label>
                                <input type="text" class="form-control rounded-3 shadow-sm" 
                                        name="switch" placeholder="Enter Switch ID" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-bold"><i class="fas fa-laptop-code me-2" style="color: #38c172;"></i>Source</label>
                                <input type="text" class="form-control rounded-3 shadow-sm" 
                                        name="src" placeholder="Enter Source Address" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-bold"><i class="fas fa-network-wired me-2" style="color: var(--gold-accent);"></i>Destination</label>
                                <input type="text" class="form-control rounded-3 shadow-sm" 
                                        name="dst" placeholder="Enter Destination Address" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-bold"><i class="fas fa-boxes me-2" style="color: #e3342f;"></i>Packet Count</label>
                                <input type="number" class="form-control rounded-3 shadow-sm" 
                                        name="pktcount" placeholder="Enter Packet Count" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-bold"><i class="fas fa-database me-2" style="color: #007bff;"></i>Byte Count</label>
                                <input type="number" class="form-control rounded-3 shadow-sm" 
                                        name="bytecount" placeholder="Enter Byte Count" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-bold"><i class="fas fa-clock me-2" style="color: #6c757d;"></i>Duration (s)</label>
                                <input type="number" class="form-control rounded-3 shadow-sm" 
                                        name="dur" placeholder="Enter Duration" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-bold"><i class="fas fa-stream me-2" style="color: var(--primary);"></i>Flows</label>
                                <input type="number" class="form-control rounded-3 shadow-sm" 
                                        name="flows" placeholder="Enter Number of Flows" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-bold"><i class="fas fa-tachometer-alt me-2" style="color: #38c172;"></i>Packet Rate</label>
                                <input type="number" step="0.01" class="form-control rounded-3 shadow-sm" 
                                        name="pktrate" placeholder="Enter Packet Rate" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-bold"><i class="fas fa-project-diagram me-2" style="color: var(--gold-accent);"></i>Protocol</label>
                                <input type="text" class="form-control rounded-3 shadow-sm" 
                                        name="Protocol" placeholder="Enter Protocol" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-bold"><i class="fas fa-wave-square me-2" style="color: #e3342f;"></i>Total Kbps</label>
                                <input type="number" step="0.01" class="form-control rounded-3 shadow-sm" 
                                        name="tot_kbps" placeholder="Enter Total Kbps" required>
                            </div>

                            <div class="col-12 mt-5">
                                <button class="btn btn-primary w-100 py-3 fw-bold rounded-3 shadow-sm" type="submit">
                                    <i class="fas fa-search me-2"></i> Detect APT
                                </button>
                            </div>

                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div class="container-fluid text-light footer mt-5 pt-5 wow fadeIn" data-wow-delay="0.1s" style="background-color: var(--secondary-dark) !important; color: #AAAAAA; border-top: 5px solid var(--primary); padding-top: 25px !important; padding-bottom: 25px !important;">
        <div class="container py-4">
            <div class="row">
                <div class="col-md-6 text-center text-md-start mb-3 mb-md-0" style="font-size: 16px; font-weight: 400;">
                    &copy; <a class="border-bottom" href="#" style="color: var(--gold-accent); text-decoration: none; border-bottom: 1px dotted var(--gold-accent);">XAI Ivory Solutions</a>. Elegant, Professional, Verifiable Security.
                </div>
                <div class="col-md-6 text-center text-md-end" style="font-size: 16px; font-weight: 400;">
                    Designed By <a class="border-bottom" href="#" style="color: var(--gold-accent); text-decoration: none; border-bottom: 1px dotted var(--gold-accent);">SWTPVTLTD</a>
                </div>
            </div>
        </div>
    </div>
    <a href="#" class="btn btn-lg btn-primary btn-lg-square rounded-circle back-to-top"><i class="bi bi-arrow-up"></i></a>


    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='lib/wow/wow.min.js') }}"></script>
    <script src="{{ url_for('static', filename='lib/easing/easing.min.js') }}"></script>
    <script src="{{ url_for('static', filename='lib/waypoints/waypoints.min.js') }}"></script>
    <script src="{{ url_for('static', filename='lib/counterup/counterup.min.js') }}"></script>
    <script src="{{ url_for('static', filename='lib/owlcarousel/owl.carousel.min.js') }}"></script>
    <script src="{{ url_for('static', filename='lib/tempusdominus/js/moment.min.js') }}"></script>
    <script src="{{ url_for('static', filename='lib/tempusdominus/js/moment-timezone.min.js') }}"></script>
    <script src="{{ url_for('static', filename='lib/tempusdominus/js/tempusdominus-bootstrap-4.min.js') }}"></script>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>

</html>
