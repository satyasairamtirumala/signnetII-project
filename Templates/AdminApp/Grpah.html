    <style>
        /* --- XAI ELEGANCE STYLES (GRAPH PAGE) --- */

        /* COLOR PALETTE */
        :root {
            --primary: #9B1C31; /* Rich Burgundy/Maroon Accent */
            --secondary-dark: #0F1D36; /* Deep Navy/Ink Base */
            --gold-accent: #B8860B; /* Subtle Gold/Dark Copper for luxury */
            --light-base: #FFFFFF; /* Pure White elements */
            --off-white-bg: #FAFAFA; /* Lightest Gray/Off-White Background */
            --shadow: rgba(155, 28, 49, 0.2); 
        }

        /* BASE & TYPOGRAPHY */
        body {
            font-family: 'Roboto', sans-serif;
            color: #555555; 
            background-color: var(--off-white-bg); /* Clean background */
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Playfair Display', serif; 
            font-weight: 700;
            color: var(--secondary-dark); 
        }
        
        /* NAVBAR - Deep Navy */
        .navbar {
            background-color: var(--secondary-dark) !important; 
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3); 
            padding-top: 15px !important;
            padding-bottom: 15px !important;
        }
        .navbar-brand h1 {
            color: var(--light-base) !important; 
            font-size: 1.4rem !important; 
            font-weight: 900 !important;
            padding-left: 20px;
        }
        .navbar-brand h1 i {
            color: var(--gold-accent); 
            font-size: 1.2em; 
        }
        /* Adjusted project title on navbar for active look and consistent branding */
        .navbar-brand .m-0.text-primary {
            color: var(--light-base) !important;
            font-size: 1.4rem !important;
        }

        .nav-link {
            color: #DDDDDD !important; 
            margin: 0 10px;
            transition: all 0.3s;
        }
        .nav-link:hover, .nav-item .nav-link.active {
            color: var(--primary) !important; 
            border-bottom: 2px solid var(--primary); 
            padding-bottom: 5px !important;
        }
        .nav-link.split-line {
            line-height: 1.2;
            text-align: center;
            padding-top: 14px !important;
            padding-bottom: 12px !important;
        }

        /* CTA BUTTONS (Logout) */
        .btn-primary {
            background-color: var(--primary);
            border-color: var(--primary);
            color: var(--light-base) !important; 
            box-shadow: 0 4px 15px var(--shadow); 
            border-radius: 8px !important; 
            padding: 16px 50px;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background-color: #7A1727; 
            border-color: #7A1727;
        }
        
        /* MAIN CONTENT CONTAINER */
        .graph-container-box {
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
            padding: 60px 20px; 
            
            /* Apply XAI Elegance Styles to the main box */
            background: var(--light-base); /* White background for the card */
            border-radius: 12px; 
            max-width: 1100px; /* Increased max width */
            margin: 100px auto 50px auto; 
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15); /* Elegant shadow */
            border-top: 5px solid var(--gold-accent); /* Gold accent top border */
            min-height: 650px;
        }

        /* Heading */
        h1.main-title {
            color: var(--primary) !important; 
            font-size: 3.0rem !important;
            font-weight: 900 !important;
            margin-bottom: 50px !important; 
            text-shadow: none !important;
            font-family: 'Playfair Display', serif;
        }

        /* Graph Image */
        .graph-image-styled {
            width: 100%; 
            max-width: 900px; /* Match container width */
            height: auto; 
            border-radius: 8px; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.1); 
            border: 1px solid #E0E0E0;
        }

        /* Footer */
        .footer-styled {
            background-color: var(--secondary-dark) !important; 
            color: #AAAAAA; 
            border-top: 5px solid var(--primary);
            margin-top: 50px;
        }

        /* Back to Top */
        .back-to-top {
            background-color: var(--primary) !important;
            color: var(--light-base) !important;
            box-shadow: 0 0 15px var(--shadow) !important;
            border-radius: 8px !important; 
        }

    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top p-0 wow fadeIn" data-wow-delay="0.1s">
        <a href="index.html" class="navbar-brand d-flex align-items-center px-4 px-lg-5">

            </div>
            <a href="/adminlogin" class="btn btn-primary rounded-0 py-4 px-lg-5 d-none d-lg-block">Logout<i class="fa fa-arrow-right ms-3"></i></a>
        </div>
    </nav>
    <div class="graph-container-box">

        <h1 class="main-title">
            <i class="fas fa-chart-bar me-2" style="color: var(--gold-accent);"></i> Model Accuracy Comparison
        </h1>

        <img src="{{url_for('static', filename='model_accuracy.png')}}" 
              alt="Model Accuracy Graph" 
              class="graph-image-styled">

    </div>
    <div class="container-fluid py-4 footer-styled">
        <div class="container text-center">
            <small>&copy; XAI Ivory Solutions. Elegant, Professional, Verifiable Security.</small>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='lib/wow/wow.min.js') }}"></script>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    
    <script>
        // Implementing the scroll behavior logic
        (function ($) {
            "use strict";
            
            new WOW().init();

            // Sticky Navbar
            $(window).scroll(function () {
                if ($(this).scrollTop() > 100) {
                    $('.sticky-top').addClass('shadow-sm').css('top', '0px');
                } else {
                    $('.sticky-top').removeClass('shadow-sm').css('top', '0px'); 
                }
            });
            
            // Back to top button
            $(window).scroll(function () {
                if ($(this).scrollTop() > 300) {
                    $('.back-to-top').fadeIn('slow');
                } else {
                    $('.back-to-top').fadeOut('slow');
                }
            });
            $('.back-to-top').click(function () {
                $('html, body').animate({scrollTop: 0}, 1500, 'easeInOutExpo');
                return false;
            });
            
        })(jQuery);
    </script>
</body>
